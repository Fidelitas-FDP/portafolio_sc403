spring.application.name=portafolio_sc403

server.port=80

# Conexion a BD local en mysql
spring.datasource.url=jdbc:mysql://localhost:3306/techshop

# Usuario y clave crearTablas.sql
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.

# Driver y comunicacion
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect # no hace falta incluirlo

# debugging de info
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

# formato de fecha y hora en consola
logging.pattern.dateformat=hh:mm

# filtrado de mensajes de spring
spring.main.banner-mode=off

# cache en desarrollo falso, en produccion
spring.thymeleaf.cache=false

firebase.bucket.name=sc403-93f53.firebasestorage.app
firebase.storage.path=portafolio
firebase.json.path=firebase
firebase.json.file=sc403-93f53-firebase-adminsdk-fbsvc-f9e0b18e09.json