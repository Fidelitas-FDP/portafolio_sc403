spring.application.name=portafolio_sc403

# Activador dinamico de perfil mediante Maven
spring.profiles.active=@activatedProfile@

server.port=80

# debugging de info
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

# formato de fecha y hora en consola
logging.pattern.dateformat=hh:mm

# filtrado de mensajes de spring
spring.main.banner-mode=off

# cache en desarrollo falso, en produccion
spring.thymeleaf.cache=false

firebase.bucket.name=sc403-93f53.firebasestorage.app
firebase.storage.path=portafolio
firebase.json.path=firebase
firebase.json.file=sc403-93f53-firebase-adminsdk-fbsvc-f9e0b18e09.json
